<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 감정나무 다이어리</title>

<style>
/* 테마별 변수 설정 */
:root {
    --bg-gradient: linear-gradient(rgba(255, 247, 251, 0.6), rgba(248, 244, 255, 0.6)), url('https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1920&q=80');
    --card-bg: rgba(255, 255, 255, 0.9);
    --text-color: #555;
    --heading-color: #4a4a4a;
    --btn-primary: #ffd6e7;
    --btn-secondary: #ffe5b4;
    --btn-success: #d8f3dc;
    --btn-home: #e5dbff;
    --box-accent: #fff6da;
}

[data-theme="white"] {
    --bg-gradient: linear-gradient(#fcfcfc, #f5f5f5);
    --card-bg: #ffffff;
    --text-color: #333;
    --heading-color: #111;
    --btn-primary: #e0e0e0;
    --btn-secondary: #eaeaea;
    --btn-success: #cfead3;
    --btn-home: #e1dbf5;
    --box-accent: #f9f9f9;
}

[data-theme="blue"] {
    --bg-gradient: linear-gradient(#e0f2fe, #bae6fd);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-color: #1e3a8a;
    --heading-color: #0369a1;
    --btn-primary: #7dd3fc;
    --btn-secondary: #e0f2fe;
    --btn-success: #bbf7d0;
    --btn-home: #e0e7ff;
    --box-accent: #f0f9ff;
}

[data-theme="black"] {
    --bg-gradient: linear-gradient(#1f2937, #111827);
    --card-bg: rgba(31, 41, 55, 0.95);
    --text-color: #e5e7eb;
    --heading-color: #f9fafb;
    --btn-primary: #4b5563;
    --btn-secondary: #374151;
    --btn-success: #065f46;
    --btn-home: #4338ca;
    --box-accent: #111827;
}

[data-theme="pink"] {
    --bg-gradient: linear-gradient(#fce7f3, #fbcfe8);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-color: #831843;
    --heading-color: #be185d;
    --btn-primary: #f9a8d4;
    --btn-secondary: #fce7f3;
    --btn-success: #bbf7d0;
    --btn-home: #f3e8ff;
    --box-accent: #fff1f2;
}

[data-theme="yellow"] {
    --bg-gradient: linear-gradient(#fef9c3, #fef08a);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-color: #713f12;
    --heading-color: #a16207;
    --btn-primary: #fde047;
    --btn-secondary: #fef9c3;
    --btn-success: #bbf7d0;
    --btn-home: #ecfdf5;
    --box-accent: #fefce8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: var(--bg-gradient);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height:100vh;
    color: var(--text-color);
    transition: background 0.3s, color 0.3s;
}

.hidden{
    display:none !important;
}

.screen{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding: 20px;
}

.card{
    background: var(--card-bg);
    backdrop-filter: blur(5px);
    padding:30px;
    border-radius:25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
    width:90%;
    max-width:600px;
    text-align: center;
    position: relative;
    color: var(--text-color);
}

h1, h2, h3{
    color: var(--heading-color);
}

button{
    border:none;
    border-radius:15px;
    padding:12px 22px;
    cursor:pointer;
    font-size:16px;
    background: var(--btn-primary);
    transition:0.2s;
    font-weight: bold;
    color: var(--text-color);
}

button:hover{
    transform:scale(1.05);
}

#tree{
    font-size:140px;
    margin-top:10px;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.mood-selection-box {
    margin-top: 15px;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 15px;
    border-radius: 20px;
}

.mood-title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 8px;
}

.mood-options {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.mood-btn {
    font-size: 32px;
    cursor: pointer;
    transition: transform 0.2s;
    user-select: none;
    opacity: 0.4;
}

.mood-btn:hover {
    transform: scale(1.2);
    opacity: 0.8;
}

.mood-btn.selected {
    transform: scale(1.3);
    opacity: 1;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
}

#daysText{
    margin-top:15px;
    display: inline-block;
    background: rgba(255, 255, 255, 0.3);
    padding: 5px 15px;
    border-radius: 20px;
}

.level-badge {
    display: inline-block;
    background: var(--heading-color);
    color: #fff;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
}

.main-btn-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.diaryBtn{
    flex: 1;
    height: 55px;
    font-size: 16px;
    background: var(--btn-secondary);
}

.galleryBtn {
    flex: 1;
    height: 55px;
    font-size: 16px;
    background: var(--btn-primary);
}

/* 상단 아이콘 버튼 */
.setting-icon-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 5px;
    transition: transform 0.2s;
}
.setting-icon-btn:hover { transform: scale(1.1); }

/* 출석판 */
#attendancePanel{
    background: var(--card-bg);
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    width: 90%;
    max-width: 450px;
    margin-bottom: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
#attendancePanel:hover {
    transform: scale(1.02);
    box-shadow: 0 12px 28px rgba(0,0,0,0.2);
}

.attendance-header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    text-align: center;
}

.day-label {
    font-size: 11px;
    font-weight: bold;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
}

.stamp-slot {
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.05);
    border-radius: 10px;
    font-size: 18px;
}
.stamp-slot.active {
    background: var(--btn-primary);
    border: 1px solid rgba(0,0,0,0.1);
}

/* 사진첩 스타일 */
.gallery-card {
    max-width: 650px !important;
    text-align: left;
}

.post-list {
    max-height: 400px;
    overflow-y: auto;
    margin: 15px 0;
    padding-right: 5px;
}

.post-item {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}

.post-meta {
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
}

.photo-upload-box {
    background: var(--box-accent);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: center;
}

.upload-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    justify-content: center;
    align-items: center;
}

.date-input {
    padding: 8px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 14px;
    font-family: inherit;
}

.uploaded-img-preview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 10px;
    margin-top: 10px;
    display: none;
}

.gallery-post-img {
    width: 100%;
    max-height: 350px;
    object-fit: cover;
    border-radius: 12px;
    margin: 10px 0;
    background: #eaeaea;
}

.comment-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    font-size: 13px;
    background: rgba(255,255,255,0.7);
}

.comment-btn {
    padding: 5px 12px;
    font-size: 13px;
    background: var(--btn-secondary);
    border-radius: 10px;
}

/* 기분 달력 스타일 */
.monthly-calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin: 15px 0;
}
.cal-header { font-size: 12px; font-weight: bold; opacity: 0.6; padding: 5px 0; text-align: center;}
.cal-day {
    height: 45px; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); border-radius: 8px;
    display: flex; flex-direction: column; justify-content: space-between; align-items: center;
    padding: 4px; font-size: 10px; opacity: 0.4;
}
.cal-day.has-data { opacity: 1; background: rgba(255,255,255,0.6); }
.cal-mood { font-size: 18px; }

.analysis-box { background: var(--box-accent); padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 14px; line-height: 1.5; text-align: left;}
.analysis-title { font-weight: bold; color: var(--heading-color); margin-bottom: 5px; }

/* 설정 UI */
.setting-group {
    text-align: left;
    margin-bottom: 20px;
}
.setting-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
}
.setting-input {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    font-size: 15px;
}
.select-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}
.select-opt {
    padding: 8px 15px;
    background: rgba(0,0,0,0.05);
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}
.select-opt.active {
    background: var(--btn-primary);
}

textarea{ width:100%; height:150px; padding:12px; border-radius:15px; border:1px solid rgba(0,0,0,0.1); resize:none; font-size:15px; margin-top: 10px; background: rgba(255,255,255,0.7);}
.questionBox{ background: var(--box-accent); padding:15px; border-radius:15px; margin-bottom:15px; text-align: left; font-weight: bold;}
.saveBtn{ background: var(--btn-success); margin-right: 5px; }
.homeBtn{ background: var(--btn-home); }
#welcomeText { font-size: 16px; font-weight: bold; margin-bottom: 2px; }
</style>
</head>

<body>

<div id="mainScreen" class="screen">
    <div id="attendancePanel" onclick="openHistory()" title="한 눈에 한 달 기분 모아보기">
        <div class="attendance-header">
            <h3>이번 주 출석 현황 <span style="font-size: 12px; opacity:0.6;">(클릭 시 달력 보기 📒)</span></h3>
        </div>
        <div class="calendar-grid">
            <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
            <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div><div class="day-label">SUN</div>
            <div class="stamp-slot" id="slot-1"></div><div class="stamp-slot" id="slot-2"></div><div class="stamp-slot" id="slot-3"></div>
            <div class="stamp-slot" id="slot-4"></div><div class="stamp-slot" id="slot-5"></div><div class="stamp-slot" id="slot-6"></div>
            <div class="stamp-slot" id="slot-0"></div>
        </div>
    </div>

    <div class="card">
        <button class="setting-icon-btn" onclick="openSetting()" title="설정">⚙️</button>

        <div id="welcomeText">✨ 정원 ✨</div>
        <div id="userLevelBadge" class="level-badge">Lv.0 씨앗 정원사</div>
        <div id="tree">🌱</div>
        
        <div class="mood-selection-box">
            <div class="mood-title">오늘 나의 기분은?</div>
            <div class="mood-options">
                <span class="mood-btn" onclick="selectMood('🤬', this)">🤬</span>
                <span class="mood-btn" onclick="selectMood('🥺', this)">🥺</span>
                <span class="mood-btn" onclick="selectMood('😰', this)">😰</span>
                <span class="mood-btn" onclick="selectMood('😭', this)">😭</span>
                <span class="mood-btn" onclick="selectMood('😊', this)">😊</span>
                <span class="mood-btn" onclick="selectMood('🤪', this)">🤪</span>
            </div>
        </div>

        <h2 id="daysText">총 출석 0일째</h2><br>
        
        <div class="main-btn-group">
            <button class="diaryBtn" onclick="openDiary()">📔 오늘의 일기 작성</button>
            <button class="galleryBtn" onclick="openGallery()">📸 날짜별 사진첩</button>
        </div>
    </div>
</div>

<div id="diaryScreen" class="screen hidden">
    <div class="card">
        <h2>오늘의 질문</h2><br>
        <div id="question" class="questionBox"></div>
        <textarea id="diaryText" placeholder="오늘의 마음을 적어보세요..."></textarea><br><br>
        <div style="display: flex; justify-content: center; gap: 8px;">
            <button class="saveBtn" onclick="saveDiary()">저장하기</button>
            <button class="homeBtn" onclick="goHome()">돌아가기</button>
        </div>
    </div>
</div>

<div id="historyScreen" class="screen hidden">
    <div class="card history-card">
        <h2 id="calendarTitle">기분 달력</h2>
        <p style="font-size:13px; opacity:0.6; margin-top:5px; text-align:center;">한 눈에 모아보는 나의 마음 지도</p>
        <div class="monthly-calendar" id="monthlyCalendarGrid">
            <div class="cal-header">일</div><div class="cal-header">월</div><div class="cal-header">화</div>
            <div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header">토</div>
        </div>
        <div class="analysis-box">
            <div class="analysis-title">✨ 감정 정원사의 마음 분석</div>
            <div id="analysisMent">기록된 기분이 아직 없습니다. 오늘 첫 기분을 심어보세요!</div>
        </div><br>
        <button class="homeBtn" onclick="closeHistory()">돌아가기</button>
    </div>
</div>

<div id="galleryScreen" class="screen hidden">
    <div class="card gallery-card">
        <h2 style="text-align:center; margin-bottom: 15px;">📸 나의 날짜별 사진첩</h2>
        
        <div class="photo-upload-box">
            <p style="font-weight:bold; margin-bottom:10px; font-size:14px;">🗓️ 추억의 순간 기록하기</p>
            <div class="upload-row">
                <input type="date" id="photoDateInput" class="date-input">
                <input type="file" id="galleryFileInput" accept="image/*" onchange="previewGalleryImage(event)" style="font-size:13px;">
            </div>
            <img id="galleryPreview" class="uploaded-img-preview" src="">
            <input type="text" id="galleryCaptionInput" class="comment-input" style="margin-top:10px; width:100%;" placeholder="사진에 대한 한 줄 설명이나 메모를 남겨보세요.">
            <button class="comment-btn" style="margin-top:8px; width:100%; background:var(--btn-primary);" onclick="uploadGalleryPost()">사진첩에 보관하기</button>
        </div>
        
        <div class="post-list" id="galleryPostContainer"></div>
        
        <div style="text-align:center; margin-top: 10px;">
            <button class="homeBtn" onclick="closeGallery()">정원으로 돌아가기</button>
        </div>
    </div>
</div>

<div id="settingScreen" class="screen hidden">
    <div class="card" style="text-align: left;">
        <h2 style="text-align: center; margin-bottom: 20px;">⚙️ 개인 설정</h2>
        
        <div class="setting-group">
            <label for="nicknameInput">👤 내 닉네임 설정</label>
            <input type="text" id="nicknameInput" class="setting-input" placeholder="닉네임을 입력하세요">
        </div>

        <div class="setting-group">
            <label>✍️ 폰트 설정</label>
            <div class="select-buttons">
                <div class="select-opt" id="font-sans" onclick="changeFont('Arial, sans-serif', 'sans')">기본 폰트</div>
                <div class="select-opt" id="font-serif" onclick="changeFont('Gungsuh, Times New Roman, serif', 'serif')">궁서/명조체</div>
                <div class="select-opt" id="font-mono" onclick="changeFont('Courier New, monospace', 'mono')">고딕/타이핑체</div>
            </div>
        </div>

        <div class="setting-group">
            <label>🎨 테마 설정</label>
            <div class="select-buttons">
                <div class="select-opt" id="theme-default" onclick="changeTheme('default')">기본 정원</div>
                <div class="select-opt" id="theme-white" onclick="changeTheme('white')">화이트</div>
                <div class="select-opt" id="theme-blue" onclick="changeTheme('blue')">블루</div>
                <div class="select-opt" id="theme-black" onclick="changeTheme('black')">블랙</div>
                <div class="select-opt" id="theme-pink" onclick="changeTheme('pink')">핑크</div>
                <div class="select-opt" id="theme-yellow" onclick="changeTheme('yellow')">옐로</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="saveBtn" onclick="saveSettings()">설정 저장하기</button>
            <button class="homeBtn" onclick="closeSetting()">취소</button>
        </div>
    </div>
</div>

<script>
const deviceUserKey = "device_user_profile_v2";
let selectedMood = ""; 
let base64ImageTemp = ""; 

const forbiddenWords = ["바보", "멍청이", "짜증나", "지랄", "새끼", "시발", "존나", "꺼져", "극혐"];

function checkBadWords(text) {
    for (let word of forbiddenWords) {
        if (text.includes(word)) {
            alert("예쁜 말 위주로 정원을 가꿔볼까요? 🥺");
            return true; 
        }
    }
    return false;
}

const diaryQuestions = [
    "오늘 당신을 미소 짓게 만든 작은 일은 무엇인가요?",
    "지금 마음의 날씨를 표현한다면 어떤가요?",
    "오늘 나를 가장 힘들게 했던 생각이나 감정이 있나요?",
    "오늘 누군가에게 들었던 말 중 가장 기억에 남는 것은?",
    "내일의 나에게 한 마디 응원을 건넨다면?"
];

const moodMentions = {
    '😊': "이번 달은 당신의 마음에 따스한 햇살이 자주 내리쬐었네요!",
    '🤬': "최근 마음에 화가 많이 쌓이셨군요. 휴식을 가져보세요.",
    '🥺': "마음이 여려지고 위로가 필요한 날이 많았습니다.",
    '😰': "불안과 걱정의 안개가 마음을 조금 흐리게 만들었네요.",
    '😭': "눈물이 나거나 슬픈 감정이 마음 가득 고였던 달이군요.",
    '🤪': "유쾌하고 활기찬 감정이 가득한 달이었습니다!"
};

window.onload = function() {
    initDeviceUser();
    applyLoadedSettings();
    updateMainScreen();
    // 사진 선택 기본 날짜를 오늘로 고정
    document.getElementById("photoDateInput").valueAsDate = new Date();
};

function initDeviceUser() {
    let userData = JSON.parse(localStorage.getItem(deviceUserKey));
    if (!userData) {
        userData = {
            nickname: "초보 정원사", fontType: "sans", fontFamily: "Arial, sans-serif", theme: "default",
            attendanceCount: 0, answersCount: 0, lastSavedDate: "", attendedDays: [], moodHistory: {}
        };
        localStorage.setItem(deviceUserKey, JSON.stringify(userData));
    }
    if (userData.answersCount === undefined) {
        userData.answersCount = userData.attendanceCount || 0;
        localStorage.setItem(deviceUserKey, JSON.stringify(userData));
    }
}

function getDeviceUser() { return JSON.parse(localStorage.getItem(deviceUserKey)); }
function saveDeviceUser(data) { localStorage.setItem(deviceUserKey, JSON.stringify(data)); }

function applyLoadedSettings() {
    let userData = getDeviceUser();
    if (!userData) return;
    document.body.setAttribute("data-theme", userData.theme || "default");
    document.body.style.fontFamily = userData.fontFamily || "Arial, sans-serif";
}

function calculateLevel(answersCount) {
    if (!answersCount || answersCount < 1) return { lv: 0, name: "씨앗 정원사" };
    if (answersCount === 1) return { lv: 1, name: "새싹 정원사" };
    if (answersCount === 2) return { lv: 2, name: "줄기 정원사" };
    if (answersCount <= 4) return { lv: 3, name: "꽃봉오리 정원사" };
    if (answersCount <= 9) return { lv: 4, name: "개화 정원사" };
    return { lv: 5, name: "마스터 정원사" };
}

/* ⚙️ 설정 관리 */
function openSetting() {
    let userData = getDeviceUser();
    document.getElementById("nicknameInput").value = userData.nickname || "초보 정원사";
    document.querySelectorAll(".select-opt").forEach(el => el.classList.remove("active"));
    const activeFont = document.getElementById(`font-${userData.fontType || 'sans'}`);
    if(activeFont) activeFont.classList.add("active");
    const activeTheme = document.getElementById(`theme-${userData.theme || 'default'}`);
    if(activeTheme) activeTheme.classList.add("active");
    document.getElementById("mainScreen").classList.add("hidden");
    document.getElementById("settingScreen").classList.remove("hidden");
}

let tempFont = { family: "", type: "" };
function changeFont(family, type) {
    tempFont.family = family; tempFont.type = type;
    document.querySelectorAll("[id^='font-']").forEach(el => el.classList.remove("active"));
    document.getElementById(`font-${type}`).classList.add("active");
}

let tempTheme = "";
function changeTheme(themeName) {
    tempTheme = themeName;
    document.querySelectorAll("[id^='theme-']").forEach(el => el.classList.remove("active"));
    document.getElementById(`theme-${themeName}`).classList.add("active");
}

function saveSettings() {
    let userData = getDeviceUser();
    const newNick = document.getElementById("nicknameInput").value.trim();
    if(checkBadWords(newNick)) return; 
    if(!newNick) { alert("닉네임을 입력해 주세요."); return; }
    
    userData.nickname = newNick;
    if(tempFont.family) { userData.fontFamily = tempFont.family; userData.fontType = tempFont.type; }
    if(tempTheme) userData.theme = tempTheme;
    
    saveDeviceUser(userData);
    applyLoadedSettings();
    updateMainScreen();
    closeSetting();
    alert("설정이 저장되었습니다! ✨");
}

function closeSetting() {
    document.getElementById("settingScreen").classList.add("hidden");
    document.getElementById("mainScreen").classList.remove("hidden");
}

/* 📔 일기 시스템 */
function selectMood(mood, element) {
    let userData = getDeviceUser();
    const today = new Date();
    const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
    selectedMood = mood;
    document.querySelectorAll(".mood-btn").forEach(btn => btn.classList.remove("selected"));
    element.classList.add("selected");
    if (!userData.moodHistory) userData.moodHistory = {};
    userData.moodHistory[todayKey] = mood;
    saveDeviceUser(userData);
}

function updateMainScreen() {
    let userData = getDeviceUser();
    if (!userData) return;
    document.getElementById("welcomeText").innerText = `✨ ${userData.nickname}님의 정원 ✨`;
    document.getElementById("daysText").innerText = `총 출석 ${userData.attendanceCount}일째`;
    
    const lvlInfo = calculateLevel(userData.answersCount);
    document.getElementById("userLevelBadge").innerText = `Lv.${lvlInfo.lv} ${lvlInfo.name} (기록: ${userData.answersCount || 0}회)`;

    const treeElement = document.getElementById("tree");
    const count = userData.attendanceCount;
    if (count === 0) treeElement.innerText = "🌱";
    else if (count <= 3) treeElement.innerText = "🌿";
    else if (count <= 6) treeElement.innerText = "🌳";
    else treeElement.innerText = "🌸";
    
    for(let i=0; i<7; i++) {
        const slot = document.getElementById(`slot-${i}`);
        if(slot) { slot.innerText = ""; slot.classList.remove("active"); }
    }
    if (userData.attendedDays) {
        userData.attendedDays.forEach(day => {
            const slot = document.getElementById(`slot-${day}`);
            if (slot) { slot.innerText = "🌸"; slot.classList.add("active"); }
        });
    }
}

    if (!selectedMood) { alert("오늘의 기분을 먼저 선택해 주세요! 😊"); return; }
